services:
  step-ca:
    image: smallstep/step-ca:latest
    container_name: certops-step-ca
    ports:
      - "9000:9000"
    environment:
      DOCKER_STEPCA_INIT_NAME: "Certops Lab CA"
      DOCKER_STEPCA_INIT_DNS_NAMES: "localhost,127.0.0.1,step-ca"
      DOCKER_STEPCA_INIT_ADDRESS: ":9000"
      DOCKER_STEPCA_INIT_PROVISIONER_NAME: "certops"
      DOCKER_STEPCA_INIT_PASSWORD_FILE: "/home/step/password.txt"
    volumes:
      - step-ca-data:/home/step
      - ./step-password.txt:/home/step/password.txt:ro

  vault:
    image: hashicorp/vault:latest
    container_name: certops-vault
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    command: server -dev

  target-linux:
    build:
      context: ./target
    container_name: certops-target-linux
    ports:
      - "2222:22"

  https-vault:
    image: nginx:alpine
    container_name: certops-https-vault
    ports:
      - "9443:443"
    volumes:
      - ./.state/https-vault:/certs:ro
      - ./nginx-vault.conf:/etc/nginx/conf.d/default.conf:ro

  cfssl-mock:
    build:
      context: ./cfssl-mock
    container_name: certops-cfssl-mock
    ports:
      - "8888:8888"
    volumes:
      - ./.state/cfssl:/certs:ro

  generic-roots:
    image: nginx:alpine
    container_name: certops-generic-roots
    ports:
      - "8088:80"
    volumes:
      - ./generic-roots:/usr/share/nginx/html:ro

volumes:
  step-ca-data:
